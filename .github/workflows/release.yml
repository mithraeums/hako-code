name: release

on:
  push:
    tags:
      - "v0.1*"
      - "v[1-9]*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.6)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            platform: linux
            artifact: hako-code-linux-x86_64.tar.gz
            staging: hako-code-linux-x86_64
            sha: hako-code-linux-x86_64.sha256

          - name: linux-arm64
            os: ubuntu-24.04-arm
            platform: linux
            artifact: hako-code-linux-arm64.tar.gz
            staging: hako-code-linux-arm64
            sha: hako-code-linux-arm64.sha256

          - name: macos-universal
            os: macos-latest
            platform: macos
            artifact: hako-code-macos-universal.tar.gz
            staging: hako-code-macos-universal
            sha: hako-code-macos-universal.sha256

          - name: windows-x86_64
            os: windows-latest
            platform: windows
            artifact: hako-code-windows-x86_64.zip
            staging: hako-code-windows-x86_64
            sha: hako-code-windows-x86_64.sha256

    steps:
      - uses: actions/checkout@v4

      # The native engine lives in mithraeums/hako; `make hakm` links its
      # libhakm.a. Check it out alongside so ../hako/engine is reachable.
      - name: Checkout engine (mithraeums/hako)
        uses: actions/checkout@v4
        with:
          repository: mithraeums/hako
          path: hako-engine-src

      - name: Build (linux — engine-linked)
        if: matrix.platform == 'linux'
        run: |
          make hakm HAKM_DIR=hako-engine-src/engine
          ./hako --version
          mkdir -p ${{ matrix.staging }}
          cp hako README.md ${{ matrix.staging }}/
          [ -f icon/hako.png ] && cp icon/hako.png ${{ matrix.staging }}/ || true
          tar czf ${{ matrix.artifact }} ${{ matrix.staging }}
          (cd ${{ matrix.staging }} && sha256sum hako > ../${{ matrix.sha }})

      # Universal2: -march=native is incompatible with multi-arch, so the engine
      # builds its portable path (-arch arm64 -arch x86_64, scalar/auto-vec int8).
      - name: Build (macos universal2 — engine-linked)
        if: matrix.platform == 'macos'
        run: |
          make hakm UNIVERSAL=1 HAKM_DIR=hako-engine-src/engine
          ./hako --version
          file hako
          mkdir -p ${{ matrix.staging }}
          cp hako README.md ${{ matrix.staging }}/
          [ -f icon/hako.icns ] && cp icon/hako.icns ${{ matrix.staging }}/ || true
          tar czf ${{ matrix.artifact }} ${{ matrix.staging }}
          (cd ${{ matrix.staging }} && shasum -a 256 hako > ../${{ matrix.sha }})

      - name: Set up MSYS2
        if: matrix.platform == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-binutils
            make
            zip

      # Windows: plain build, NO engine. The engine uses POSIX mmap (sys/mman.h)
      # which MinGW lacks, so `make hakm` won't compile here. Cloud providers work;
      # local `:provider mithraeum` is unavailable on Windows until an mmap shim
      # lands. Linux/macOS/FreeBSD ship the engine.
      - name: Build (windows — cloud only, no local engine)
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        run: |
          export PATH=/mingw64/bin:$PATH
          make CC=gcc
          ./hako.exe --version
          mkdir -p ${{ matrix.staging }}
          cp hako.exe README.md ${{ matrix.staging }}/
          [ -f icon/hako.ico ] && cp icon/hako.ico ${{ matrix.staging }}/ || true
          zip -r ${{ matrix.artifact }} ${{ matrix.staging }}
          (cd ${{ matrix.staging }} && sha256sum hako.exe > ../${{ matrix.sha }})

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.sha }}
          if-no-files-found: error

  build-freebsd:
    name: build (freebsd-x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout engine (mithraeums/hako)
        uses: actions/checkout@v4
        with:
          repository: mithraeums/hako
          path: hako-engine-src

      - name: Build in FreeBSD VM (engine-linked)
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.1"
          usesh: true
          prepare: |
            pkg install -y curl gmake gcc
          run: |
            gmake hakm CC=gcc MAKE=gmake HAKM_DIR=hako-engine-src/engine
            ./hako --version
            mkdir -p hako-code-freebsd-x86_64
            cp hako README.md hako-code-freebsd-x86_64/
            tar czf hako-code-freebsd-x86_64.tar.gz hako-code-freebsd-x86_64
            (cd hako-code-freebsd-x86_64 && printf '%s  hako\n' "$(sha256 -q hako)" > ../hako-code-freebsd-x86_64.sha256)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: freebsd-x86_64
          path: |
            hako-code-freebsd-x86_64.tar.gz
            hako-code-freebsd-x86_64.sha256
          if-no-files-found: error

  release:
    name: publish release
    needs: [build, build-freebsd]
    runs-on: ubuntu-latest
    if: always() && needs.build.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: hako-code ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/**/hako-code-linux-x86_64.tar.gz
            dist/**/hako-code-linux-arm64.tar.gz
            dist/**/hako-code-macos-universal.tar.gz
            dist/**/hako-code-windows-x86_64.zip
            dist/**/hako-code-freebsd-x86_64.tar.gz
            dist/**/*.sha256
